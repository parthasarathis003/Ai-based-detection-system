<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Verify OTP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter','Segoe UI',sans-serif;
}

/* BODY */

body{

min-height:100vh;

background: linear-gradient(135deg,#e0f2fe,#f8fafc,#e2e8f0);

display:flex;

align-items:center;

justify-content:center;

}

/* CARD */

.box{

width:380px;

padding:35px;

border-radius:16px;

background: rgba(255,255,255,0.75);

backdrop-filter: blur(12px);

border:1px solid rgba(37,99,235,0.15);

box-shadow:

0 15px 35px rgba(37,99,235,0.15),

0 5px 15px rgba(0,0,0,0.05);

text-align:center;

}

/* TITLE */

.box h2{

color:#1e3a8a;

margin-bottom:6px;

}

/* SUBTITLE */

.subtitle{

color:#64748b;

font-size:14px;

margin-bottom:25px;

}

/* INPUT */

.box input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:8px;

border:1px solid #cbd5f5;

background:#f8fafc;

color:#0f172a;

outline:none;

transition:.2s;

}

.box input:focus{

border-color:#3b82f6;

box-shadow:0 0 0 2px rgba(59,130,246,0.15);

}

/* BUTTON */

.box button{

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:8px;

font-weight:600;

color:white;

background: linear-gradient(135deg,#2563eb,#3b82f6);

cursor:pointer;

transition:.25s;

}

.box button:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(37,99,235,0.25);

}

/* LINK */

.box p{

margin-top:15px;

font-size:13px;

}

.box a{

color:#2563eb;

text-decoration:none;

font-weight:500;

}

.box a:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="box">

<h2>

Verify OTP

</h2>

<div class="subtitle">

Enter the OTP sent to your email

</div>

<form action="/verify-otp" method="post">

<input type="hidden" name="email" value="{{email}}">

<input

type="text"

name="otp"

placeholder="Enter OTP"

required

>

<button type="submit">

Verify OTP

</button>

<p>

<a href="/forgot-password">

Back

</a>

</p>

</form>

</div>

</body>

</html>
