 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Access - AI Missing Person System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top, #020617, #000000);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    color:white;
}

/* -------- AI GRID BACKGROUND -------- */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:
        linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.06) 1px, transparent 1px);
    background-size: 45px 45px;
    animation: gridMove 25s linear infinite;
}

@keyframes gridMove{
    from{transform:translate(0,0);}
    to{transform:translate(-45px,-45px);}
}

/* -------- PORTAL BOX -------- */
.portal{
    position:relative;
    z-index:2;
    width:420px;
    padding:40px;
    border-radius:18px;
    background: rgba(15,23,42,0.75);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 50px rgba(59,130,246,0.25);
    border:1px solid rgba(59,130,246,0.35);
    text-align:center;
}

/* -------- TITLE -------- */
.portal h2{
    color:#60a5fa;
    letter-spacing:1px;
    margin-bottom:6px;
}

.subtitle{
    font-size:13px;
    color:#cbd5f5;
    margin-bottom:25px;
}

/* -------- ICON -------- */
.ai-icon{
    font-size:42px;
    margin-bottom:15px;
    text-shadow:0 0 20px rgba(59,130,246,0.8);
}

/* -------- BUTTONS -------- */
.actions{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-top:25px;
}

.action-btn{
    text-decoration:none;
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    letter-spacing:1px;
    color:white;
    text-align:center;
    position:relative;
    overflow:hidden;
    transition:0.4s;
}

/* Login Button */
.login{
    background: linear-gradient(90deg,#2563eb,#38bdf8);
    box-shadow:0 0 20px rgba(56,189,248,0.5);
}

/* Register Button */
.register{
    background: linear-gradient(90deg,#16a34a,#22c55e);
    box-shadow:0 0 20px rgba(34,197,94,0.5);
}

/* Shine Effect */
.action-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition:0.6s;
}

.action-btn:hover::before{
    left:100%;
}

.action-btn:hover{
    transform:translateY(-3px) scale(1.02);
}

/* -------- FOOTER TEXT -------- */
.footer{
    margin-top:25px;
    font-size:11px;
    color:#93c5fd;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="portal">

    <div class="ai-icon">🤖</div>

    <h2>User Portal</h2>
    <div class="subtitle">AI Missing Person & Object Detection System</div>

    <div class="actions">
        <a href="/user-login" class="action-btn login">SECURE LOGIN</a>
        <a href="/register" class="action-btn register">CREATE ACCOUNT</a>
    </div>

    <div class="footer">
        AI Powered Surveillance Platform
    </div>

</div>

</body>
</html>
