 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Missing Person System - Forgot Password</title>

<style>

/* -------- GLOBAL -------- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#e0f2fe,#f0f9ff,#dbeafe);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* subtle pattern */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(circle at 20% 30%, rgba(59,130,246,0.15) 0, transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(37,99,235,0.15) 0, transparent 35%);
}

/* -------- CARD -------- */
.box{
    position:relative;
    width:390px;
    padding:40px;
    border-radius:18px;

    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);

    border:1px solid rgba(59,130,246,0.15);

    box-shadow:
        0 10px 30px rgba(37,99,235,0.15),
        0 2px 8px rgba(0,0,0,0.05);

    text-align:center;
}

/* -------- TITLE -------- */
.box h2{
    color:#1e3a8a;
    margin-bottom:6px;
    font-weight:600;
}

.subtitle{
    color:#64748b;
    font-size:14px;
    margin-bottom:28px;
}

/* -------- INPUT -------- */
.box input{
    width:100%;
    padding:13px;
    margin:12px 0;

    border-radius:10px;
    border:1px solid #cbd5e1;

    background:#f8fafc;

    font-size:14px;
    transition:0.25s;
}

.box input:focus{
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
    outline:none;
}

/* -------- BUTTON -------- */
.box button{

    width:100%;
    padding:13px;
    margin-top:18px;

    border:none;
    border-radius:10px;

    font-weight:600;
    letter-spacing:.5px;

    color:white;

    background: linear-gradient(135deg,#2563eb,#3b82f6);

    cursor:pointer;

    transition:0.25s;
}

.box button:hover{

    background: linear-gradient(135deg,#1e40af,#2563eb);

    transform: translateY(-1px);

    box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

/* -------- LINKS -------- */
.box p{
    margin-top:22px;
    color:#475569;
    font-size:14px;
}

.box a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.box a:hover{
    text-decoration:underline;
}

/* -------- ALERT -------- */
.alert{

    background:#ecfeff;

    border:1px solid #67e8f9;

    padding:12px;

    margin-bottom:18px;

    border-radius:10px;

    color:#0f766e;

    font-size:14px;

    text-align:left;
}

/* -------- RESPONSIVE -------- */

@media(max-width:420px){

.box{

width:90%;

padding:30px;

}

}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<div class="subtitle">
Enter your email to receive OTP
</div>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="alert">
{{ messages[0] }}
</div>

{% endif %}
{% endwith %}

<form action="{{ url_for('send_otp') }}" method="POST">

<input
type="email"
name="email"
placeholder="Enter your registered email"
required>

<button type="submit">

Send OTP

</button>

</form>

<p>

Remember your password?

<a href="/user-login">

Login here

</a>

</p>

</div>

</body>
</html>
