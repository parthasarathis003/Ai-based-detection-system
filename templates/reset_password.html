<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#d1d5db;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e40af;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:#2563eb;
text-decoration:none;
}

.flash{
color:red;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<!-- Flash Messages -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash">
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('reset_password') }}">

<!-- Hidden Email -->
<input type="hidden" name="email" value="{{ email }}">

<input type="password" name="password" placeholder="New Password" required>

<input type="password" name="confirm_password" placeholder="Confirm Password" required>

<button type="submit">Update Password</button>

</form>

<div class="link">
<a href="/user-login">Back to Login</a>
</div>

</div>

</body>
</html>
