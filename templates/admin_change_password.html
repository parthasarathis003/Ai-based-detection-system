<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>
<style>
body{
    background:#d1d5db; /* 70% grey */
    color:#000000; /* all text black */
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Segoe UI, sans-serif;
}

.box{
    background:#ffffff; /* 20% white */
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    padding:40px;
    border-radius:15px;
    width:350px;
    color:#000000; /* text inside box black */
}

h2{
    color:#000000; /* heading black */
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #9ca3af; /* subtle grey border */
    font-size:14px;
    color:#000000; /* input text black */
}

input::placeholder{
    color:#000000; /* placeholder black */
}

button{
    width:100%;
    padding:12px;
    background:#2563eb; /* 10% blue accent */
    color:#000000; /* button text black */
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:background 0.3s ease;
}

button:hover{
    color:#000000;
    background:#1d4ed8; /* darker blue on hover */
}

.flash{
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    animation: fadeOut 5s forwards;
    color:#000000; /* flash text black */
    font-size:14px;
}

.flash.error{background:#dc2626;} /* red background */
.flash.success{background:#16a34a;} /* green background */

@keyframes fadeOut{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>
<div class="box">
    <h2>Change Password</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
        <input type="password" name="old_password" placeholder="Old Password" required>
        <input type="password" name="new_password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        <button>UPDATE PASSWORD</button>
    </form>
</div>
</body>
</html>
