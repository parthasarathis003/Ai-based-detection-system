<!DOCTYPE html>
<html>
<head>
<title>Staff Dashboard</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.card{
    background: rgba(255,255,255,0.08);
    padding:30px;
    border-radius:15px;
    margin:30px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="header">
<h2>Staff Dashboard</h2>
<a href="/logout">Logout</a>
</div>

<div class="card">
<h3>CCTV Monitoring</h3>
<p>AI Camera detection system running...</p>
<button>Start Detection</button>
</div>

<div class="card">
<h3>Missing Reports</h3>
<p>View reports submitted by students.</p>
</div>

</body>
</html>
