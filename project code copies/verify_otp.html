<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
display:flex;
align-items:center;
justify-content:center;
}

/* BOX */

.box{
width:380px;
padding:35px;
border-radius:16px;
background: rgba(15,23,42,0.8);
backdrop-filter: blur(10px);
border:1px solid rgba(59,130,246,0.3);
text-align:center;
box-shadow:0 0 40px rgba(59,130,246,0.25);
}

/* TITLE */

.box h2{
color:#60a5fa;
margin-bottom:10px;
}

.subtitle{
color:#cbd5f5;
font-size:13px;
margin-bottom:25px;
}

/* INPUT */

.box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid rgba(59,130,246,0.3);
background: rgba(2,6,23,0.7);
color:white;
outline:none;
}

.box input::placeholder{
color:#94a3b8;
}

/* BUTTON */

.box button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-weight:bold;
color:white;
background: linear-gradient(90deg,#2563eb,#38bdf8);
cursor:pointer;
transition:0.3s;
}

.box button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(56,189,248,0.6);
}

.box p{
margin-top:15px;
color:#cbd5f5;
font-size:13px;
}

</style>

</head>

<body>

<div class="box">

<h2>Verify OTP</h2>
<div class="subtitle">Enter the OTP sent to your email</div>

<form action="/verify-otp" method="post">

<input type="hidden" name="email" value="{{email}}">

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

<p><a href="/forgot-password">Back</a></p>

</form>

</div>

</body>
</html>
