<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Missing Person System - Forgot Password</title>

<style>

/* -------- GLOBAL -------- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top, #0f172a, #020617);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* -------- AI GRID BACKGROUND -------- */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:
        linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveGrid 20s linear infinite;
}

@keyframes moveGrid{
    from{transform:translate(0,0);}
    to{transform:translate(-40px,-40px);}
}

/* -------- BOX -------- */
.box{
    position:relative;
    z-index:2;
    width:380px;
    padding:35px;
    border-radius:16px;
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(12px);
    box-shadow:0 0 40px rgba(59,130,246,0.25);
    border:1px solid rgba(59,130,246,0.3);
    text-align:center;
}

/* -------- TITLE -------- */
.box h2{
    color:#60a5fa;
    margin-bottom:8px;
}

.subtitle{
    color:#cbd5f5;
    font-size:13px;
    margin-bottom:25px;
}

/* -------- INPUT -------- */
.box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid rgba(59,130,246,0.3);
    background: rgba(2,6,23,0.7);
    color:white;
    outline:none;
}

.box input::placeholder{
    color:#94a3b8;
}

.box input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 10px rgba(59,130,246,0.5);
}

/* -------- BUTTON -------- */
.box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    letter-spacing:1px;
    color:white;
    background: linear-gradient(90deg,#2563eb,#38bdf8);
    cursor:pointer;
    transition:0.3s;
}

.box button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(56,189,248,0.6);
}

/* -------- LINKS -------- */
.box p{
    margin-top:18px;
    color:#cbd5f5;
    font-size:13px;
}

.box a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:bold;
}

.box a:hover{
    text-decoration:underline;
}

/* -------- FLASH MESSAGE -------- */
.alert{
    background:#0f172a;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    color:#22c55e;
    font-size:13px;
}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>
<div class="subtitle">Reset your account password</div>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="alert">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form action="{{ url_for('send_otp') }}" method="POST">

<input type="email" name="email" placeholder="Enter your registered email" required>

<button type="submit">Send OTP</button>

</form>

<p>Remember your password? <a href="/user-login">Login</a></p>

</div>

</body>
</html>
